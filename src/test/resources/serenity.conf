serenity {
  project.name = "Contoso University - Parallel Serenity BDD Framework"

  # Screenshot strategy
  take.screenshots = FOR_FAILURES
  screenshots.for.each.action = false
  reports.show.step.details = true

  # Parallel execution stability
  restart.browser.each.scenario = false
  maintain.session = false
  thread.count = 4
  batch.count = 4
  batch.number = 1

  # Timeouts
  timeout = 20000
  webdriver.wait.for.timeout = 20000

  # Logging
  logging = VERBOSE
}

webdriver {
  driver = "chrome"

  # Chrome switches for parallel stability
  chrome.switches = [
    "--start-maximized",
    "--disable-gpu",
    "--disable-dev-shm-usage",
    "--no-sandbox",
    "--remote-allow-origins=*",
    "--disable-infobars",
    "--disable-extensions"
  ]

  # Headless toggle (enable for CI)
  chrome.headless = false
}

# Cucumber settings
cucumber {
  report.show.retries = true
  report.show.tags = true
  report.show.related.requirements = true
}

# Environment configuration
environment {
  default {
    webdriver.base.url = "https://localhost:5050"
  }
}
